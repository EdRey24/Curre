spring.application.name=curreServer

spring.datasource.url=jdbc:sqlite:curre.db
spring.datasource.driver-class-name=org.sqlite.JDBC

spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect

spring.jpa.hibernate.ddl-auto=none

spring.jpa.show-sql=true

# Allow connections from any network interface (critical for emulator/physical devices)
server.address=0.0.0.0

# Email (SendGrid)
sendgrid.api.key=${SENDGRID_API_KEY}
sendgrid.from.email=${SENDGRID_FROM_EMAIL}

# SMS (Twilio)
twilio.account.sid=${TWILIO_ACCOUNT_SID}
twilio.auth.token=${TWILIO_AUTH_TOKEN}
twilio.from.phone=${TWILIO_FROM_PHONE}